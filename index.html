<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Granix · Relevamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#CC1621;--red2:#a8111b;--red-soft:#f9e8e9;
  --black:#1a1a1a;--white:#fff;
  --g1:#f5f5f5;--g2:#ececec;--g3:#d0d0d0;--g4:#999;--g5:#555;
  --green:#1e8a47;--green-soft:#e6f5ec;
  --blue-soft:#e8f0fe;--blue:#1a56db;
  --font:'Nunito',sans-serif;
  --r:14px;--rs:9px;
  --sh:0 1px 6px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shr:0 4px 20px rgba(204,22,33,.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--g1);color:var(--black);min-height:100vh;padding-bottom:84px}

.header{background:var(--red);position:sticky;top:0;z-index:100;box-shadow:var(--shr)}
.htop{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{height:68px;width:68px;object-fit:contain;border-radius:8px;background:#fff;padding:3px}
.brand-name{font-size:19px;font-weight:900;color:#fff;letter-spacing:.5px;line-height:1}
.brand-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;display:block}
.h-export{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer}
.tabs{display:flex;background:var(--red2);border-top:1px solid rgba(255,255,255,.1)}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;letter-spacing:.4px;text-transform:uppercase}
.tab.on{color:#fff;border-bottom-color:#fff}

.screen{display:none;padding:16px}.screen.on{display:block}

.card{background:#fff;border-radius:var(--r);padding:18px 16px;margin-bottom:14px;box-shadow:var(--sh)}
.card-lbl{font-size:10px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-lbl::after{content:'';flex:1;height:1px;background:var(--red-soft)}

.field{margin-bottom:12px}
.fl{font-size:10px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;display:block}
.field input{width:100%;padding:11px 13px;border:1.5px solid var(--g2);border-radius:var(--rs);font-size:15px;font-family:var(--font);color:var(--black);background:var(--g1);transition:border-color .2s,background .2s;-webkit-appearance:none}
.field input:focus{outline:none;border-color:var(--red);background:#fff}

.ac-wrap{position:relative}
.ac-list{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1.5px solid var(--g2);border-radius:var(--rs);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;max-height:190px;overflow-y:auto;display:none}
.ac-list.open{display:block}
.ac-item{padding:11px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--g1);display:flex;align-items:center;gap:8px;transition:background .15s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item:active{background:var(--red-soft)}
.ac-item::before{content:"↩";font-size:11px;color:var(--g4)}

.fam-block{margin-bottom:8px;border-radius:var(--rs);overflow:hidden;box-shadow:var(--sh)}
.fam-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:#fff;cursor:pointer;user-select:none;border-left:3px solid var(--red)}
.fam-head:active{background:var(--red-soft)}
.fam-left{display:flex;align-items:center;gap:8px}
.fam-emoji{font-size:17px}
.fam-name{font-size:13px;font-weight:800;color:var(--black)}
.fam-right{display:flex;align-items:center;gap:6px}
.fam-badge{font-size:11px;font-weight:700;background:var(--red-soft);color:var(--red);border-radius:20px;padding:2px 9px}
.fam-badge.has{background:var(--green-soft);color:var(--green)}
.fam-arr{font-size:11px;color:var(--g4);transition:transform .22s}
.fam-arr.open{transform:rotate(180deg)}
.fam-body{background:#fff;border-top:1px solid var(--g2);display:none}
.fam-body.open{display:block}
.fam-sw{padding:8px 12px;border-bottom:1px solid var(--g1)}
.fam-si{width:100%;padding:7px 11px;border:1.5px solid var(--g2);border-radius:7px;font-size:13px;font-family:var(--font);background:var(--g1)}
.fam-si:focus{outline:none;border-color:var(--red)}

.prod-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .15s}
.prod-item:last-child{border-bottom:none}
.prod-item:active{background:var(--g1)}
.prod-item.on{background:var(--green-soft)}
.prod-check{width:22px;height:22px;border:2px solid var(--g3);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;background:#fff}
.prod-item.on .prod-check{background:var(--green);border-color:var(--green);color:#fff}
.prod-label{font-size:13.5px;color:var(--black);line-height:1.3}
.prod-item.on .prod-label{color:var(--green);font-weight:700}

.btn-main{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:800;font-family:var(--font);letter-spacing:.4px;cursor:pointer;box-shadow:var(--shr);transition:background .2s,transform .1s}
.btn-main:active{background:var(--red2);transform:scale(.98)}
.btn-ghost{width:100%;padding:12px;background:#fff;color:var(--red);border:1.5px solid var(--red);border-radius:var(--rs);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;margin-top:10px;transition:background .2s}
.btn-ghost:active{background:var(--red-soft)}

.frow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--g2);background:#fff;color:var(--g5);cursor:pointer;transition:all .2s}
.chip.on{background:var(--red);border-color:var(--red);color:#fff}

.lcard{background:#fff;border-radius:var(--r);padding:15px;margin-bottom:12px;box-shadow:var(--sh);border-left:4px solid var(--red)}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:8px}
.lc-name{font-size:15px;font-weight:800}
.lc-tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px}
.t-tipo{background:var(--red-soft);color:var(--red)}
.t-ciu{background:var(--blue-soft);color:var(--blue)}
.lc-meta{font-size:12px;color:var(--g4);margin-bottom:9px;line-height:1.7}
.lc-bw{height:5px;background:var(--g2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.lc-b{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.lc-p{font-size:12px;color:var(--green);font-weight:700}
.lc-acts{display:flex;gap:8px;margin-top:11px}
.bsm{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font)}
.b-edit{background:var(--red-soft);color:var(--red)}
.b-del{background:var(--g1);color:var(--g5)}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sbox{background:#fff;border-radius:var(--r);padding:16px 12px;text-align:center;box-shadow:var(--sh)}
.snum{font-size:30px;font-weight:900;color:var(--red);line-height:1}
.slbl{font-size:10px;font-weight:700;color:var(--g4);margin-top:4px;text-transform:uppercase;letter-spacing:.6px}

.ccrd{background:#fff;border-radius:var(--rs);padding:15px;margin-bottom:10px;box-shadow:var(--sh)}
.cc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cc-n{font-size:14px;font-weight:800}
.cc-p{font-size:22px;font-weight:900;color:var(--red)}
.cc-s{font-size:11px;color:var(--g4);margin-bottom:9px}
.cc-bw{height:7px;background:var(--g2);border-radius:4px;overflow:hidden}
.cc-b{height:100%;background:linear-gradient(90deg,var(--red),#ff5c66);border-radius:4px}

.trow{margin-bottom:13px}
.tp{display:flex;justify-content:space-between;margin-bottom:4px}
.tn{font-size:13px;font-weight:600}
.tpct{font-size:13px;font-weight:800;color:var(--red)}
.tbw{height:5px;background:var(--g2);border-radius:3px;overflow:hidden;margin-bottom:3px}
.tb{height:100%;background:var(--red);border-radius:3px}
.ts{font-size:10px;color:var(--g4)}

.btn-exp{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:800;font-family:var(--font);cursor:pointer;margin-top:4px;letter-spacing:.3px}

.empty{text-align:center;padding:44px 20px;color:var(--g4)}
.eico{font-size:38px;margin-bottom:10px}
.etxt{font-size:14px;font-weight:600}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--black);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;transition:all .28s;z-index:400;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex}
.mbox{background:#fff;border-radius:var(--r);padding:24px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.mtit{font-size:16px;font-weight:800;margin-bottom:8px}
.mbod{font-size:14px;color:var(--g5);line-height:1.6;margin-bottom:20px}
.mrow{display:flex;gap:10px}
.mcan{flex:1;padding:12px;border-radius:8px;background:var(--g1);color:var(--g5);border:none;font-weight:700;cursor:pointer;font-family:var(--font);font-size:14px}
.mok{flex:1;padding:12px;border-radius:8px;background:var(--red);color:#fff;border:none;font-weight:800;cursor:pointer;font-family:var(--font);font-size:14px}
</style>
</head>

  "🫘 Crackers Semillas":["CEREAL","LINO","SESAMO SIN SAL","SESAMO"],
  "🥜 Fibra Total":["FIBRA TOTAL CON PASAS","FIBRA TOTAL","FIBRA TOTAL INTEGRAL"],
  "🌾 Avena":["AVENA EXTRAFINA","AVENA TRADICIONAL","AVENA HOJUELON","HARINA DE AVENA","AVENA INSTANTANEA","AVENA MIX MANZANA","AVENA MIX ARANDANOS","AVENA MIX PAPAYA","AVENA MIX ALGARROBA"],
  "🥨 Veggie Snacks":["VEGGIE SNACKS PIZZA","VEGGIE SNACKS CEBOLLA","VEGGIE SNACKS BARBACOA"],
  "🫙 Hummus":["HUMMUS CLASICO","HUMMUS REMOLACHA Y ZANAHORIA","HUMMUS TOMATE Y PEREJIL","HUMMUS CON ESPECIAS"],
  "🫘 Legumbres":["GARBANZOS","ARVEJAS ENTERAS","LENTEJAS","POROTOS NEGROS"],
  "🧂 Rebozadores":["REBOZADOR NATURAL","REBOZADOR SABORIZADO","REBOZADOR INTEGRAL","REBOZADOR DE MAIZ"],
  "🫒 Otros":["NUTRISOJA MILANESA","FECULA DE MANDIOCA","ACEITE GIRASOL ALTO OLEICO"]
};
const TOTAL=Object.values(PRODS).reduce((a,b)=>a+b.length,0);
let ck=new Set();

const S={
  get:k=>{try{return JSON.parse(localStorage.getItem('gnx_'+k))||[];}catch{return [];}},
  set:(k,v)=>localStorage.setItem('gnx_'+k,JSON.stringify(v)),
  ls:()=>S.get('locales'),
  save:v=>S.set('locales',v)
};

function goTab(id,el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('s-'+id).classList.add('on');
  el.classList.add('on');
  if(id==='hist')renderHist();
  if(id==='res')renderRes();
}

function acShow(iid,lid,key){
  const v=document.getElementById(iid).value.trim().toLowerCase();
  const items=S.get(key);
  const f=v?items.filter(x=>x.toLowerCase().includes(v)):items;
  const l=document.getElementById(lid);
  if(!f.length){l.classList.remove('open');return;}
  l.innerHTML=f.map(x=>`<div class="ac-item" onmousedown="acPick('${iid}','${lid}','${x.replace(/'/g,"\'")}','${key}')">${x}</div>`).join('');
  l.classList.add('open');
}

function acPick(iid,lid,val,key){
  document.getElementById(iid).value=val;
  document.getElementById(lid).classList.remove('open');
  acSave(val,key);
}

function acSave(val,key){
  if(!val)return;
  const a=S.get(key);
  if(!a.includes(val)){a.push(val);S.set(key,a);}
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.ac-wrap'))document.querySelectorAll('.ac-list').forEach(l=>l.classList.remove('open'));
});

['f-tipo','f-ciu'].forEach(id=>{
  document.getElementById(id).addEventListener('blur',()=>{
    setTimeout(()=>{const v=document.getElementById(id).value.trim();if(v)acSave(v,id==='f-tipo'?'tipos':'ciudades');},250);
  });
});

function renderProds(cs=new Set()){
  document.getElementById('prods-wrap').innerHTML=Object.entries(PRODS).map(([fam,prods])=>{
    const fid='f'+fam.replace(/\W+/g,'_');
    const cnt=prods.filter(p=>cs.has(p)).length;
    return `<div class="fam-block">
      <div class="fam-head" onclick="togFam('${fid}')">
        <div class="fam-left"><span class="fam-emoji">${fam.split(' ')[0]}</span><span class="fam-name">${fam.replace(/^\S+\s*/,'')}</span></div>
        <div class="fam-right"><span class="fam-badge${cnt>0?' has':''}" id="${fid}-c">${cnt}/${prods.length}</span><span class="fam-arr" id="${fid}-a">▼</span></div>
      </div>
      <div class="fam-body" id="${fid}-b">
        <div class="fam-sw"><input class="fam-si" placeholder="Buscar..." oninput="famS(this,'${fid}')"></div>
        ${prods.map(p=>{
          const pid='p'+p.replace(/\W+/g,'_');
          return `<div class="prod-item${cs.has(p)?' on':''}" id="${pid}" onclick="togProd(this,'${p}','${fid}',${prods.length})"><div class="prod-check">${cs.has(p)?'✓':''}</div><span class="prod-label">${p}</span></div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function togFam(fid){
  document.getElementById(fid+'-b').classList.toggle('open');
  document.getElementById(fid+'-a').classList.toggle('open');
}

function famS(inp,fid){
  const v=inp.value.toLowerCase();
  document.querySelectorAll('#'+fid+'-b .prod-item').forEach(el=>{
    el.style.display=el.querySelector('.prod-label').textContent.toLowerCase().includes(v)?'':'none';
  });
}

function togProd(el,prod,fid,total){
  const on=el.classList.toggle('on');
  el.querySelector('.prod-check').textContent=on?'✓':'';
  on?ck.add(prod):ck.delete(prod);
  const cnt=document.querySelectorAll('#'+fid+'-b .prod-item.on').length;
  const b=document.getElementById(fid+'-c');
  b.textContent=cnt+'/'+total;
  b.className='fam-badge'+(cnt>0?' has':'');
}

function guardar(){
  const nom=document.getElementById('f-nom').value.trim();
  const tipo=document.getElementById('f-tipo').value.trim();
  const ciu=document.getElementById('f-ciu').value.trim();
  if(!nom||!tipo||!ciu){toast('⚠️ Nombre, tipo y ciudad son obligatorios');return;}
  acSave(tipo,'tipos');acSave(ciu,'ciudades');
  const ls=S.ls();
  ls.push({id:Date.now(),nom,tipo,ciu,dir:document.getElementById('f-dir').value.trim(),tel:document.getElementById('f-tel').value.trim(),prods:[...ck],fecha:new Date().toLocaleDateString('es-AR'),total:TOTAL});
  S.save(ls);toast('✓ Relevamiento guardado');limpiar();
}

function limpiar(){
  ['f-nom','f-tipo','f-ciu','f-dir','f-tel'].forEach(id=>document.getElementById(id).value='');
  ck=new Set();renderProds();
}

let filtCiu=null;
function renderHist(){
  const ls=S.ls();
  const cius=[...new Set(ls.map(l=>l.ciu))];
  document.getElementById('filt-row').innerHTML=
    `<div class="chip${filtCiu===null?' on':''}" onclick="filtrar(null,this)">Todos</div>`+
    cius.map(c=>`<div class="chip${filtCiu===c?' on':''}" onclick="filtrar('${c}',this)">${c}</div>`).join('');
  renderList();
}

function filtrar(ciu,el){
  filtCiu=ciu;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');renderList();
}

function renderList(){
  const ls=S.ls().filter(l=>!filtCiu||l.ciu===filtCiu).slice().reverse();
  const cont=document.getElementById('hist-list');
  if(!ls.length){cont.innerHTML='<div class="empty"><div class="eico">📋</div><div class="etxt">Sin relevamientos aún</div></div>';return;}
  cont.innerHTML=ls.map(l=>{
    const pct=Math.round(l.prods.length/TOTAL*100);
    return `<div class="lcard">
      <div class="lc-top"><div class="lc-name">${l.nom}</div><div class="lc-tags"><span class="tag t-tipo">${l.tipo}</span><span class="tag t-ciu">${l.ciu}</span></div></div>
      <div class="lc-meta">${l.dir?'📍 '+l.dir+'<br>':''}${l.tel?'📞 '+l.tel+'<br>':''}📅 ${l.fecha} · ${l.prods.length} productos</div>
      <div class="lc-bw"><div class="lc-b" style="width:${pct}%"></div></div>
      <div class="lc-p">${pct}% presencia Granix</div>
      <div class="lc-acts">
        <button class="bsm b-edit" onclick="editar(${l.id})">✏️ Ver / Editar</button>
        <button class="bsm b-del" onclick="confirmarDel(${l.id})">🗑 Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

function editar(id){
  const ls=S.ls();const l=ls.find(x=>x.id===id);if(!l)return;
  document.getElementById('f-nom').value=l.nom;
  document.getElementById('f-tipo').value=l.tipo;
  document.getElementById('f-ciu').value=l.ciu;
  document.getElementById('f-dir').value=l.dir||'';
  document.getElementById('f-tel').value=l.tel||'';
  ck=new Set(l.prods);
  S.save(ls.filter(x=>x.id!==id));
  renderProds(ck);
  goTab('nuevo',document.querySelectorAll('.tab')[0]);
  toast('Editando relevamiento...');
}

function renderRes(){
  const ls=S.ls();
  const cius=[...new Set(ls.map(l=>l.ciu))];
  const total=ls.length;
  const prom=total?Math.round(ls.reduce((a,l)=>a+l.prods.length/TOTAL*100,0)/total):0;
  document.getElementById('sg').innerHTML=`
    <div class="sbox"><div class="snum">${total}</div><div class="slbl">Locales visitados</div></div>
    <div class="sbox"><div class="snum">${prom}%</div><div class="slbl">Presencia promedio</div></div>
    <div class="sbox"><div class="snum">${cius.length}</div><div class="slbl">Ciudades</div></div>
    <div class="sbox"><div class="snum">${ls.reduce((a,l)=>a+l.prods.length,0)}</div><div class="slbl">Presencias totales</div></div>`;
  if(cius.length){
    document.getElementById('ciu-s').innerHTML='<div class="card"><div class="card-lbl">Por Ciudad</div>'+
      cius.map(c=>{
        const cl=ls.filter(l=>l.ciu===c);
        const p=Math.round(cl.reduce((a,l)=>a+l.prods.length/TOTAL*100,0)/cl.length);
        return `<div class="ccrd"><div class="cc-h"><div class="cc-n">📍 ${c}</div><div class="cc-p">${p}%</div></div><div class="cc-s">${cl.length} local${cl.length!==1?'es':''} · presencia promedio</div><div class="cc-bw"><div class="cc-b" style="width:${p}%"></div></div></div>`;
      }).join('')+'</div>';
  } else document.getElementById('ciu-s').innerHTML='';

  const tipos=[...new Set(ls.map(l=>l.tipo))];
  if(tipos.length){
    document.getElementById('tipo-s').innerHTML='<div class="card"><div class="card-lbl">Por Tipo de Local</div>'+
      tipos.map(t=>{
        const tl=ls.filter(l=>l.tipo===t);
        const p=Math.round(tl.reduce((a,l)=>a+l.prods.length/TOTAL*100,0)/tl.length);
        return `<div class="ccrd"><div class="cc-h"><div class="cc-n">🏪 ${t}</div><div class="cc-p">${p}%</div></div><div class="cc-s">${tl.length} local${tl.length!==1?'es':''} · presencia promedio</div><div class="cc-bw"><div class="cc-b" style="width:${p}%"></div></div></div>`;
      }).join('')+'</div>';
  } else document.getElementById('tipo-s').innerHTML='';

  const cnt={};
  ls.forEach(l=>l.prods.forEach(p=>cnt[p]=(cnt[p]||0)+1));
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('top-p').innerHTML=sorted.length
    ?sorted.map(([p,n])=>{const pct=total?Math.round(n/total*100):0;return `<div class="trow"><div class="tp"><span class="tn">${p}</span><span class="tpct">${pct}%</span></div><div class="tbw"><div class="tb" style="width:${pct}%"></div></div><div class="ts">${n} de ${total} locales</div></div>`;}).join('')
    :'<div class="empty"><div class="eico">📦</div><div class="etxt">Sin datos aún</div></div>';
}

function exportCSV(){
  const ls=S.ls();
  if(!ls.length){toast('No hay datos para exportar');return;}
  const allP=Object.values(PRODS).flat();
  const hdr=['Nombre Local','Tipo de Local','Ciudad','Dirección','Contacto','Fecha','Cant. Productos','% Presencia',...allP];
  const rows=ls.map(l=>{const s=new Set(l.prods);return[l.nom,l.tipo,l.ciu,l.dir||'',l.tel||'',l.fecha,l.prods.length,Math.round(l.prods.length/TOTAL*100)+'%',...allP.map(p=>s.has(p)?'SÍ':'NO')];});
  const csv=[hdr,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Granix_Relevamiento_'+new Date().toLocaleDateString('es-AR').replace(/\//g,'-')+'.csv';
  a.click();URL.revokeObjectURL(a.href);toast('✓ Archivo descargado');
}

let delId=null;
function confirmarDel(id){
  delId=id;document.getElementById('modal').classList.add('open');
  document.getElementById('mok').onclick=()=>{S.save(S.ls().filter(l=>l.id!==delId));closeModal();renderHist();toast('Eliminado');};
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

renderProds();
</script>
</body>
</html>
